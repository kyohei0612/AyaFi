repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        pass_filenames: false
        args: [--strict, src]
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings>=2.2
          - python-json-logger>=3.0
          - types-pyperclip

  - repo: local
    hooks:
      - id: gen-ts-types
        name: Regenerate TypeScript IPC types
        language: system
        entry: python scripts/gen_ts_types.py
        files: ^src/aya_afi/ipc/protocol\.py$
        pass_filenames: false
